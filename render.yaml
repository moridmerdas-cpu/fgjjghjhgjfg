services:
  - type: web
    name: nexoself
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TG_ID
        value: "8296865861"
      - key: OWNER_USERNAME
        value: "amele55"
      - key: OWNER_PHONE
        sync: false
      - key: SITE_URL
        sync: false
      - key: PORT
        value: "10000"
      # ─── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # ─── جام جهانی (football-data.org) ──────────────────────────────────────
      - key: FOOTBALL_API_KEY
        sync: false
      - key: WC_CHANNEL_ID
        sync: false
      - key: WC_MIN_BET
        value: "10"
      - key: WC_MAX_BET
        value: "5000"
      - key: WC_POLL_INTERVAL
        value: "600"
      - key: WC_COMPETITION
        value: "WC"
