services:
  - type: worker
    name: amel-self55
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TG_ID
        value: "8296865861"
      - key: OWNER_USERNAME
        value: "amele55"
      - key: OWNER_PHONE
        sync: false
      # ─── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # ─── Upstash Redis (چند سرور همزمان — اختیاری) ──────────────────────────
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_URL_2
        sync: false
      - key: UPSTASH_REDIS_URL_3
        sync: false
