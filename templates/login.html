{% extends "base.html" %}

{% block title %}ورود | NexoSelf{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-box">
            <div class="auth-header">
                <span class="auth-icon">🔐</span>
                <h2>ورود به NexoSelf</h2>
                <p>برای دسترسی به پنل مدیریت وارد شوید</p>
            </div>
            
            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>👤 یوزرنیم</label>
                    <input type="text" id="loginUsername" placeholder="یوزرنیم خود را وارد کنید" required autofocus>
                </div>
                
                <div class="form-group">
                    <label>🔑 رمز عبور</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" placeholder="رمز عبور را وارد کنید" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            👁️
                        </button>
                    </div>
                </div>
                
                <div id="loginError" class="auth-error" style="display:none;"></div>
                
                <button type="submit" class="btn-primary full-width" id="loginBtn">
                    <span class="btn-text">🚀 ورود</span>
                    <span class="btn-loader" style="display:none;">⏳</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>حساب کاربری ندارید؟ <a href="{{ url_for('register_page') }}">ثبت‌نام کنید</a></p>
                <p class="auth-note">💡 نسخه ۲.۰ — سلف‌بات نسل جدید</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
        errorEl.textContent = '❌ لطفاً همه فیلدها را پر کنید';
        errorEl.style.display = 'block';
        return;
    }

    btn.querySelector('.btn-text').textContent = 'در حال ورود...';
    btn.querySelector('.btn-loader').style.display = 'inline';
    btn.disabled = true;
    errorEl.style.display = 'none';

    try {
        const res = await fetch('/api/panel-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.ok) {
            window.location.href = '/';
        } else {
            errorEl.textContent = '❌ ' + data.error;
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = '❌ خطا در ارتباط با سرور';
        errorEl.style.display = 'block';
    }

    btn.querySelector('.btn-text').textContent = '🚀 ورود';
    btn.querySelector('.btn-loader').style.display = 'none';
    btn.disabled = false;
}

function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

// Enter key handler
document.getElementById('loginForm').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        this.querySelector('button[type="submit"]').click();
    }
});
</script>
{% endblock %}
